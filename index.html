<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello Explorers Camp 2026 — Escape from the Island</title>
  <link rel="icon" type="image/svg+xml" href="resources/icons/favicon.svg">
  <link rel="stylesheet" href="resources/css/camp.css?v=3">
</head>
<body>

  <!-- ============================ Screen 1: island ======================== -->
  <div id="screen-island" class="screen ocean-bg">
    <div id="island-stage"></div>
    <div id="island-actions">
      <button id="award-open" class="gear-btn" title="Award shells"></button>
      <button id="admin-open" class="gear-btn" title="Camp crew settings"></button>
      <button id="lang-toggle" class="gear-btn" title="Language">CZ</button>
      <button id="intro-open" class="gear-btn" title="Intro"></button>
      <button id="podium-open" class="gear-btn end-night-btn">End the night</button>
    </div>
  </div>

  <!-- ============================ Podium (end of night) =================== -->
  <div id="screen-podium" class="screen ocean-bg">
    <div id="podium-title"></div>
    <div id="podium-stage"></div>
    <button id="podium-back" class="back-btn">← Back to the island</button>
  </div>

  <!-- ============================ Intro cinematic ========================= -->
  <div id="intro-overlay">
    <video id="intro-video" src="resources/camp/intro.mp4" preload="metadata" playsinline></video>
    <button id="intro-skip" class="back-btn">Skip ▶▶</button>
  </div>

  <!-- ============================ Screen 2: shop ========================== -->
  <div id="screen-shop" class="screen ocean-bg">
    <header class="shop-header">
      <button id="shop-back" class="back-btn">← Island</button>
      <span id="shop-team-badge"></span>
      <span class="shop-title" id="shop-title">Shipyard</span>
      <span class="spacer"></span>
      <span id="shop-shells-wrap"><span id="shop-shells">0</span></span>
    </header>
    <div class="shop-body">
      <div id="shop-categories"></div>
      <aside class="shop-side">
        <div class="shop-preview">
          <div id="shop-preview-boat"></div>
          <div id="shop-preview-parts"></div>
        </div>
        <button id="shop-play" class="play-btn">▶ PLAY</button>
      </aside>
    </div>
  </div>

  <!-- ============================ Screen 3: game ========================== -->
  <div id="screen-game" class="screen">
    <div id="game-wrap">
      <div id="game-frame">
        <canvas id="game-canvas" width="540" height="760"></canvas>

        <div id="hud-bars" class="hud">
          <div>
            <div class="hud-bar-label" id="hud-fuel-label">FUEL</div>
            <div class="hud-bar"><div id="hud-fuel-fill" class="hud-bar-fill"></div></div>
          </div>
          <div id="hud-wind" style="visibility:hidden">
            <div class="hud-bar-label" id="hud-wind-label">WIND</div>
            <div class="hud-bar"><div id="hud-wind-fill" class="hud-bar-fill"></div></div>
          </div>
          <div id="hud-armor"></div>
        </div>

        <div id="hud-tag-wrap" class="hud"><span id="game-team-tag"></span></div>
        <div id="hud-distance-wrap" class="hud"><span id="hud-distance">0 m</span></div>
        <div id="hud-ready" class="hud">Press ◀ or ▶ to set sail</div>
        <div id="hud-countdown" class="hud" style="display:none"></div>

        <div id="game-overlay">
          <div class="over-panel">
            <div id="over-title">CRASHED!</div>
            <div class="over-stat"><span class="lbl" id="over-run-label">This run</span><span class="val" id="over-run">0 m</span></div>
            <div class="over-stat"><span class="lbl" id="over-best-label">Best tonight</span><span class="val" id="over-best">0 m</span></div>
            <div class="over-buttons">
              <button id="over-repeat" class="over-btn">↺ REPEAT</button>
              <button id="over-continue" class="over-btn">CONTINUE ➜</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== Award shells (the nightly job) ================== -->
  <div id="award-modal">
    <div class="admin-panel award-panel">
      <h2 id="award-title">Award shells</h2>
      <div class="admin-cols" id="award-hint">Shells earned in camp games</div>
      <div id="award-rows"></div>
      <div class="admin-buttons">
        <span class="spacer"></span>
        <button id="award-done" class="admin-btn">Done</button>
      </div>
    </div>
  </div>

  <!-- ============================ Admin modal ============================= -->
  <div id="admin-modal">
    <div class="admin-panel">
      <h2 id="admin-title">Camp crew settings</h2>
      <div class="admin-cols" id="admin-cols">Color · Team name · Shells · Distance (m)</div>
      <div id="admin-rows"></div>
      <div class="admin-buttons">
        <button id="admin-reset" class="admin-btn">Reset everything</button>
        <span class="spacer"></span>
        <button id="admin-cancel" class="admin-btn">Cancel</button>
        <button id="admin-save" class="admin-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="resources/js/camp/data.js?v=3"></script>
  <script src="resources/js/camp/state.js?v=3"></script>
  <script src="resources/js/camp/sprites.js?v=3"></script>
  <script src="resources/js/camp/pixelart.js?v=3"></script>
  <script src="resources/js/camp/screens.js?v=3"></script>
  <script src="resources/js/camp/game.js?v=3"></script>
  <script src="resources/js/camp/main.js?v=3"></script>
</body>
</html>
